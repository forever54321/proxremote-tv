name: ProxRemoteTV
options:
  bundleIdPrefix: com.proxremote
  deploymentTarget:
    tvOS: "16.0"
  xcodeVersion: "15.0"

targets:
  ProxRemoteTV:
    type: application
    platform: tvOS
    deploymentTarget: "16.0"
    sources:
      - ProxRemoteTV
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.proxremote.tv
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        INFOPLIST_FILE: ProxRemoteTV/Info.plist
        SWIFT_VERSION: "5.9"
        DEVELOPMENT_TEAM: ""
      configs:
        Debug:
          SWIFT_OPTIMIZATION_LEVEL: "-Onone"
        Release:
          SWIFT_OPTIMIZATION_LEVEL: "-O"
